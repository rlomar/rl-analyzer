services:
  - type: web
    name: rl-analyzer
    runtime: node
    repo: https://github.com/rlomar/rl-analyzer
    plan: free
    buildCommand: cd backend-node && npm install --include=dev && npm run build && npx prisma generate && npx prisma db push && npx tsx prisma/seed-achievements.ts && npx tsx prisma/seed.ts
    startCommand: cd backend-node && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: FRONTEND_URL
        value: https://rl-coach-dashboard.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: rl-analyzer-db
          property: connectionString
          append: "?schema=rlcoach"

  - type: web
    name: rl-coach-dashboard
    runtime: static
    repo: https://github.com/rlomar/rl-analyzer
    buildCommand: echo "Static site, no build needed"
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://rl-analyzer-7535.onrender.com/api

databases:
  - name: rl-analyzer-db
    plan: free
    databaseName: rlanalyzer
    ipAllowList: []
