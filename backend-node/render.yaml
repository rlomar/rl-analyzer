services:
  - type: web
    name: rl-coach-api
    runtime: node
    repo: https://github.com/rlomar/rl-analyzer
    plan: free
    buildCommand: cd backend-node && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend-node && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: FRONTEND_URL
        value: https://rl-analyzer.pages.dev
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: DATABASE_URL
        fromDatabase:
          name: rl-coach-db
          property: connectionString
      - key: DATABASE_URL
        sync: false
databases:
  - name: rl-coach-db
    plan: free
    databaseName: rlcoach
    ipAllowList: []
